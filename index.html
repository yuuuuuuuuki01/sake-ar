<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR酒蔵見学 - 金井酒造店</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- 言語切替UI -->
  <div id="lang-switcher">
    <button class="lang-btn active" data-lang="ja">日本語</button>
    <button class="lang-btn" data-lang="en">EN</button>
    <button class="lang-btn" data-lang="zh">中文</button>
  </div>

  <!-- ガイドメッセージ -->
  <div id="guide-message">
    <span id="guide-text">マーカーにカメラをかざしてください</span>
  </div>

  <!-- コンテンツオーバーレイ（マーカー検出時に表示） -->
  <div id="spot-overlay">
    <div class="spot-card">
      <div class="spot-header">
        <span class="spot-number"></span>
        <span class="spot-title"></span>
      </div>
      <img class="spot-photo" src="/images/placeholder.svg" alt="">
      <p class="spot-desc"></p>
    </div>
  </div>

  <!-- A-Frame AR シーン -->
  <a-scene
    embedded
    arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3_HAMMING63; debugUIEnabled: false;"
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; colorManagement: true;"
  >
    <a-assets>
      <img id="placeholder-img" src="/images/placeholder.svg" crossorigin="anonymous">
    </a-assets>

    <!-- マーカー 0〜9 を動的生成するためのコンテナ -->
    <!-- app.js がここにマーカーエンティティを挿入 -->

    <a-entity camera></a-entity>
  </a-scene>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
